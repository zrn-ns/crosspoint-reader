name: Compile Release
on:
  push:
    tags:
      - '*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false

      - name: Install PlatformIO Core
        run: uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      - name: Build CrossPoint
        run: pio run -e gh_release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CrossPoint-${{ github.ref_name }}
          path: |
            .pio/build/gh_release/bootloader.bin
            .pio/build/gh_release/firmware.bin
            .pio/build/gh_release/firmware.elf
            .pio/build/gh_release/firmware.map
            .pio/build/gh_release/partitions.bin

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: CrossPoint Reader CJK ${{ github.ref_name }}
          files: .pio/build/gh_release/firmware.bin
          body: |
            ## CrossPoint Reader CJK ${{ github.ref_name }}

            基于 [CrossPoint Reader](https://github.com/daveallie/crosspoint-reader) 的 CJK 适配版本。

            ### 📥 安装方式

            1. 使用 USB-C 连接设备到电脑
            2. 访问 https://xteink-flasher-cjk.vercel.app/ 点击 **"Flash CrossPoint CJK firmware"** 一键刷入

            > 也可下载下方 \`firmware.bin\` 后使用 "Flash firmware from file" 手动刷入

            ### 📝 详细说明

            - [README](https://github.com/aBER0724/crosspoint-reader-cjk)
            - [完整变更日志](https://github.com/aBER0724/crosspoint-reader-cjk/commits/${{ github.ref_name }})
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
